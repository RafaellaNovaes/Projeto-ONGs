<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Campanhas | Mais Amor Por Favor</title>
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<header>
  <h1>Mais Amor Por Favor</h1>
  <p>Escolha uma causa e faça a diferença</p>
  <button class="btn-sair" onclick="logout()">Sair</button>
</header>

<div class="container">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
    <h2 style="margin:0; border:none; padding:0;">Campanhas Disponíveis</h2>
    <a href="historico_doacao.html" class="btn-submit"
       style="width:auto; padding:10px 20px; margin:0; background:#1A2A40; color:white;">
      📋 Minhas Doações
    </a>
  </div>

  <div id="alert-msg" class="alert erro"></div>

  <div class="card-grid" id="lista-campanhas">
    <p style="color:#888;">Carregando campanhas...</p>
  </div>
</div>

<script type="module">
  import { auth, campanhaAPI } from './js/api.js';
  if (!auth.isLogged()) window.location.href = 'index.html';

  window.logout = () => { auth.logout(); window.location.href = 'index.html'; };

  async function carregarCampanhas() {
    const grid = document.getElementById('lista-campanhas');
    const alertEl = document.getElementById('alert-msg');

    try {
      const lista = await campanhaAPI.listar() || [];

      if (lista.length === 0) {
        grid.innerHTML = '<p style="color:#888; grid-column:1/-1;">Nenhuma campanha disponível no momento.</p>';
        return;
      }

      grid.innerHTML = lista.map(c => {
        const desc = c.descricao || 'Sem descrição.';
        const descResumida = desc.length > 100 ? desc.substring(0, 100) + '...' : desc;
        const statusClass = {
          'Ativa': 'badge-ativa',
          'Pausada': 'badge-pausada',
          'Encerrada': 'badge-encerrada'
        }[c.status] || 'badge-ativa';

        return `
          <div class="campanha-card">
            <div>
              <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px;">
                <h3 style="margin:0; font-size:1.1rem;">${c.nome || 'Sem nome'}</h3>
                <span class="badge ${statusClass}">${c.status || 'Ativa'}</span>
              </div>
              <p style="font-size:0.88rem; color:#666; margin:0 0 12px;">${descResumida}</p>
              ${c.endereco ? `<p style="font-size:0.82rem; color:#999; margin:0 0 4px;">📍 ${c.endereco.cidade || ''} - ${c.endereco.estado || ''}</p>` : ''}
            </div>
            <a href="detalhe_campanha.html?id=${c.id}"
               class="btn-submit" style="margin-top:16px; background:#1A2A40; color:white; text-align:center;">
              Ver Detalhes →
            </a>
          </div>`;
      }).join('');
    } catch (e) {
      alertEl.textContent = 'Erro ao carregar campanhas: ' + e.message;
      alertEl.classList.add('show');
      grid.innerHTML = '';
    }
  }

  carregarCampanhas();
</script>
</body>
</html>
