<%@page contentType="text/html" pageEncoding="UTF-8"%>
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mais Amor Por Favor | Login</title>
    <link rel="stylesheet" type="text/css" href="css/estilos.css">
</head>
<body class="login-page">

<div class="container">
    <div class="card login-card">
        <h1>Mais Amor Por Favor</h1>
        
        <div class="toggle-wrapper">
            <span class="label-text">Doador</span>
            <label class="switch">
                <input type="checkbox" id="profile-toggle" onclick="toggleProfile()">
                <span class="slider round"></span>
            </label>
            <span class="label-text">Organizador</span>
        </div>

        <form action="ManterPessoa" method="POST">
            
            <input type="hidden" name="btnop" value="Login">

            <div class="input-group">
                <label>E-mail</label>
                <input type="email" name="txtemail" required placeholder="exemplo@email.com">
            </div>
            
            <div class="input-group">
                <label>Senha</label>
                <input type="password" name="txtsenha" required placeholder="******">
            </div>

            <button type="submit" id="btn-login" class="btn-submit">Entrar como Doador</button>
            
            <p id="registro-texto" style="margin-top: 20px;">
                Ainda não tem conta? 
                <a href="cadastro_pessoa.jsp?perfil=doador" id="link-cadastro" style="color: #E1AD01; font-weight: bold; text-decoration: none;">
                    Cadastre-se como Doador
                </a>
            </p>
            
            <% 
                String msg = (String) request.getAttribute("msg");
                if (msg != null && !msg.isEmpty()) { 
            %>
                <p style="color: #d9534f; margin-top: 15px; font-weight: bold; text-align: center;">
                    <%= msg %>
                </p>
            <% } %>
        </form>
    </div>
</div>

<script src="js/funcoes.js"></script>
</body>
</html>
