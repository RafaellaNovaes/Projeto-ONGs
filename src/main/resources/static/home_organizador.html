<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel do Organizador | Mais Amor Por Favor</title>
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<header>
  <h1>Mais Amor Por Favor</h1>
  <p>Painel Administrativo — Gestão de Campanhas</p>
  <button class="btn-sair" onclick="logout()">Sair</button>
</header>

<div class="container">
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; flex-wrap:wrap; gap:12px;">
      <h2 style="margin:0; border:none; padding:0;">Minhas Campanhas</h2>
      <a href="cadastro_campanha.html" class="btn-submit"
         style="width:auto; padding:10px 22px; margin:0;">
        + Nova Campanha
      </a>
    </div>

    <div id="alert-msg" class="alert erro"></div>

    <div id="tabela-wrapper">
      <p style="color:#888; text-align:center; padding:20px;">Carregando campanhas...</p>
    </div>

    <div style="margin-top:24px;">
      <a href="index.html" class="link-voltar" style="text-align:left;">← Sair do Sistema</a>
    </div>
  </div>
</div>

<script type="module">
  import { auth, campanhaAPI } from './js/api.js';
  if (!auth.isLogged()) window.location.href = 'index.html';

  window.logout = () => { auth.logout(); window.location.href = 'index.html'; };

  async function carregarCampanhas() {
    const wrapper = document.getElementById('tabela-wrapper');
    const alertEl = document.getElementById('alert-msg');

    try {
      const lista = await campanhaAPI.listar() || [];

      if (lista.length === 0) {
        wrapper.innerHTML = `<p style="text-align:center; padding:30px; color:#888;">Você ainda não possui campanhas cadastradas.</p>`;
        return;
      }

      wrapper.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Nome da Campanha</th>
              <th>Status</th>
              <th>Período</th>
              <th style="text-align:center;">Ações</th>
            </tr>
          </thead>
          <tbody>
            ${lista.map(c => {
              const statusClass = {
                'Ativa': 'badge-ativa',
                'Pausada': 'badge-pausada',
                'Encerrada': 'badge-encerrada'
              }[c.status] || 'badge-ativa';

              return `
                <tr>
                  <td><strong>${c.nome || '—'}</strong></td>
                  <td><span class="badge ${statusClass}">${c.status || 'Ativa'}</span></td>
                  <td style="font-size:0.85rem; color:#666;">
                    ${c.dataInicio || '?'} → ${c.dataFim || '?'}
                  </td>
                  <td style="text-align:center; white-space:nowrap;">
                    <a href="cadastro_campanha.html?id=${c.id}"
                       style="color:#1A2A40; font-weight:700; text-decoration:none; margin-right:16px;">
                      ✏️ Editar
                    </a>
                    <button class="btn-danger" onclick="deletarCampanha('${c.id}', this)">
                      🗑️ Excluir
                    </button>
                  </td>
                </tr>`;
            }).join('')}
          </tbody>
        </table>`;
    } catch (e) {
      alertEl.textContent = 'Erro ao carregar campanhas: ' + e.message;
      alertEl.classList.add('show');
      wrapper.innerHTML = '';
    }
  }

  window.deletarCampanha = async function(id, btn) {
    if (!confirm('Tem certeza que deseja excluir esta campanha?')) return;
    btn.disabled = true;
    btn.textContent = '...';
    try {
      await campanhaAPI.deletar(id);
      carregarCampanhas();
    } catch (e) {
      alert('Erro ao excluir: ' + e.message);
      btn.disabled = false;
      btn.textContent = '🗑️ Excluir';
    }
  };

  carregarCampanhas();
</script>
</body>
</html>
