<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Minhas Doações | Mais Amor Por Favor</title>
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<header>
  <h1>Mais Amor Por Favor</h1>
  <p>Histórico de Contribuições</p>
</header>

<div class="container">
  <div class="card">
    <h2>Minhas Doações Realizadas</h2>

    <div id="alert-msg" class="alert erro"></div>

    <div id="tabela-wrapper">
      <p style="color:#888; text-align:center; padding:30px;">Carregando histórico...</p>
    </div>

    <div style="margin-top:24px;">
      <a href="home_doador.html" class="link-voltar" style="text-align:left;">← Voltar ao Início</a>
    </div>
  </div>
</div>

<script type="module">
  import { auth, doacaoAPI } from './js/api.js';
  if (!auth.isLogged()) window.location.href = 'index.html';

  async function carregarHistorico() {
    const wrapper = document.getElementById('tabela-wrapper');
    const alertEl = document.getElementById('alert-msg');
    const user = auth.getUser();

    // doadorId pode não estar disponível se vier só do token;
    // usamos email como fallback para mostrar aviso amigável
    if (!user || !user.id) {
      wrapper.innerHTML = `
        <div class="info-box">
          ℹ️ Não foi possível identificar seu ID de doador. Tente sair e entrar novamente.
        </div>`;
      return;
    }

    try {
      const doacoes = await doacaoAPI.porDoador(user.id) || [];

      if (doacoes.length === 0) {
        wrapper.innerHTML = `
          <p style="text-align:center; padding:30px; color:#888;">
            Você ainda não realizou nenhuma doação.<br>
            <a href="home_doador.html" style="color:#E1AD01; font-weight:700; text-decoration:none;">
              Ver campanhas disponíveis →
            </a>
          </p>`;
        return;
      }

      let total = 0;
      const linhas = doacoes.map(d => {
        const isFin = d.valor != null;
        const valor = isFin
          ? parseFloat(d.valor)
          : parseFloat(d.valorEstimado || 0);
        total += valor;

        return `
          <tr>
            <td>${d.data || '—'}</td>
            <td>${isFin ? '💵 Financeira' : '📦 Item'}</td>
            <td style="color:#555;">
              ${isFin
                ? `Via ${d.metodoPagamento || '—'}`
                : `${d.descricao || '—'} <span style="font-size:0.8rem; color:#999;">(${d.categoria || ''})</span>`}
            </td>
            <td style="text-align:right; font-weight:700; color:#1A2A40;">
              ${isFin
                ? `R$ ${valor.toFixed(2)}`
                : `Est. R$ ${valor.toFixed(2)}`}
            </td>
          </tr>`;
      }).join('');

      wrapper.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Data</th>
              <th>Tipo</th>
              <th>Detalhes</th>
              <th style="text-align:right;">Valor</th>
            </tr>
          </thead>
          <tbody>${linhas}</tbody>
          <tfoot>
            <tr style="background:#f9f9f9; font-weight:700;">
              <td colspan="3" style="padding:13px 14px;">Total Contribuído</td>
              <td style="padding:13px 14px; text-align:right; color:#1A2A40;">
                R$ ${total.toFixed(2)}
              </td>
            </tr>
          </tfoot>
        </table>`;
    } catch (e) {
      alertEl.textContent = 'Erro ao carregar histórico: ' + e.message;
      alertEl.classList.add('show');
      wrapper.innerHTML = '';
    }
  }

  carregarHistorico();
</script>
</body>
</html>
