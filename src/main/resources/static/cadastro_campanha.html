<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gerenciar Campanha | Mais Amor Por Favor</title>
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<header>
  <h1>Mais Amor Por Favor</h1>
  <p id="subtitulo-tela">Nova Campanha</p>
</header>

<div class="container">
  <div class="card">
    <div id="alert-msg" class="alert erro"></div>

    <div class="form-grid">
      <div class="full-width">
        <label>Nome da Campanha</label>
        <input type="text" id="c-nome" required placeholder="Ex: Agasalho Solidário 2025">
      </div>

      <div class="full-width">
        <label>Descrição Detalhada</label>
        <textarea id="c-desc" rows="4" required placeholder="Descreva o objetivo da campanha..."></textarea>
      </div>

      <div>
        <label>Data de Início</label>
        <input type="date" id="c-dataini" required>
      </div>

      <div>
        <label>Data de Término</label>
        <input type="date" id="c-datafim" required>
      </div>

      <div>
        <label>Capacidade (Pessoas)</label>
        <input type="number" id="c-cap" required min="1" placeholder="100">
      </div>

      <div>
        <label>Status</label>
        <select id="c-status">
          <option value="Ativa">Ativa</option>
          <option value="Pausada">Pausada</option>
          <option value="Encerrada">Encerrada</option>
        </select>
      </div>

      <div class="full-width">
        <label>Contato do Responsável</label>
        <input type="text" id="c-contres" required placeholder="(11) 99999-9999 ou email">
      </div>

      <div class="full-width" style="margin-top:8px; padding-top:16px; border-top:1px solid #eee;">
        <label style="font-size:1rem; color:#1A2A40;">📍 Endereço da Campanha</label>
      </div>

      <div class="full-width">
        <label>Logradouro</label>
        <input type="text" id="c-logradouro" required placeholder="Rua, número, bairro">
      </div>

      <div>
        <label>Cidade</label>
        <input type="text" id="c-cidade" required placeholder="São Paulo">
      </div>

      <div>
        <label>Estado (UF)</label>
        <input type="text" id="c-estado" required placeholder="SP" maxlength="2"
               style="text-transform:uppercase;">
      </div>

      <div>
        <label>CEP</label>
        <input type="text" id="c-cep" required placeholder="00000-000">
      </div>
    </div>

    <button class="btn-submit" id="btn-salvar" onclick="salvarCampanha()">Criar Campanha</button>
    <a href="home_organizador.html" class="link-voltar">Cancelar e Voltar</a>
  </div>
</div>

<script type="module">
  import { auth, campanhaAPI } from './js/api.js';
  if (!auth.isLogged()) window.location.href = 'index.html';

  const params = new URLSearchParams(window.location.search);
  const idCampanha = params.get('id');

  if (idCampanha) {
    document.getElementById('subtitulo-tela').textContent = 'Editar Campanha';
    document.getElementById('btn-salvar').textContent = 'Salvar Alterações';
    carregarDados(idCampanha);
  }

  async function carregarDados(id) {
    try {
      const c = await campanhaAPI.buscarId(id);
      document.getElementById('c-nome').value     = c.nome || '';
      document.getElementById('c-desc').value     = c.descricao || '';
      document.getElementById('c-dataini').value  = c.dataInicio || '';
      document.getElementById('c-datafim').value  = c.dataFim || '';
      document.getElementById('c-cap').value      = c.capacidadePessoas || '';
      document.getElementById('c-status').value   = c.status || 'Ativa';
      document.getElementById('c-contres').value  = c.contatoResponsavel || '';
      if (c.endereco) {
        document.getElementById('c-logradouro').value = c.endereco.logradouro || '';
        document.getElementById('c-cidade').value     = c.endereco.cidade || '';
        document.getElementById('c-estado').value     = c.endereco.estado || '';
        document.getElementById('c-cep').value        = c.endereco.cep || '';
      }
    } catch (e) {
      mostrarErro('Erro ao carregar dados: ' + e.message);
    }
  }

  function mostrarErro(msg) {
    const alertEl = document.getElementById('alert-msg');
    alertEl.textContent = msg;
    alertEl.classList.add('show');
    window.scrollTo(0, 0);
  }

  window.salvarCampanha = async function () {
    const alertEl = document.getElementById('alert-msg');
    alertEl.classList.remove('show');

    const dataIni = document.getElementById('c-dataini').value;
    const dataFim = document.getElementById('c-datafim').value;

    if (dataFim && dataIni && new Date(dataFim) < new Date(dataIni)) {
      mostrarErro('⚠️ A data de término não pode ser anterior à data de início.');
      return;
    }

    const user = auth.getUser();
    const payload = {
      nome: document.getElementById('c-nome').value.trim(),
      descricao: document.getElementById('c-desc').value.trim(),
      dataInicio: dataIni,
      dataFim: dataFim,
      capacidadePessoas: parseInt(document.getElementById('c-cap').value),
      status: document.getElementById('c-status').value,
      contatoResponsavel: document.getElementById('c-contres').value.trim(),
      endereco: {
        logradouro: document.getElementById('c-logradouro').value.trim(),
        cidade: document.getElementById('c-cidade').value.trim(),
        estado: document.getElementById('c-estado').value.trim().toUpperCase(),
        cep: document.getElementById('c-cep').value.trim()
      },
      organizador: { id: user ? user.id : null }
    };

    const btn = document.getElementById('btn-salvar');
    btn.disabled = true;
    btn.textContent = 'Salvando...';

    try {
      if (idCampanha) {
        await campanhaAPI.atualizar(idCampanha, payload);
      } else {
        await campanhaAPI.criar(payload);
      }
      alert('✅ Campanha salva com sucesso!');
      window.location.href = 'home_organizador.html';
    } catch (e) {
      mostrarErro('Erro ao salvar: ' + e.message);
      btn.disabled = false;
      btn.textContent = idCampanha ? 'Salvar Alterações' : 'Criar Campanha';
    }
  };
</script>
</body>
</html>
