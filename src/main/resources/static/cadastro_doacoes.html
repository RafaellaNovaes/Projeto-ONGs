<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Fazer Doação | Mais Amor Por Favor</title>
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<header>
  <h1>Mais Amor Por Favor</h1>
  <p>Sua contribuição transforma vidas 💛</p>
</header>

<div class="container">
  <div class="card" style="max-width:620px; margin:0 auto;">
    <h2>Registrar Doação</h2>
    <div id="alert-msg" class="alert erro"></div>

    <div class="form-grid">
      <div class="full-width">
        <label>Tipo de Doação</label>
        <select id="d-tipo" onchange="alternarCampos()">
          <option value="financeira">💵 Financeira</option>
          <option value="item">📦 Item / Mantimento</option>
        </select>
      </div>

      <!-- CAMPOS FINANCEIROS -->
      <div id="grupo-financeiro" style="display:contents;">
        <div>
          <label>Valor da Doação (R$)</label>
          <input type="number" id="d-valor" step="0.01" min="0.01" placeholder="0,00">
        </div>
        <div>
          <label>Método de Pagamento</label>
          <select id="d-metodo">
            <option value="PIX">PIX</option>
            <option value="CARTAO_CREDITO">Cartão de Crédito</option>
            <option value="TRANSFERENCIA">Transferência Bancária</option>
          </select>
        </div>
      </div>

      <!-- CAMPOS ITEM -->
      <div id="grupo-item" style="display:none; grid-column:span 2;">
        <div class="form-grid">
          <div class="full-width">
            <label>Descrição do Item</label>
            <input type="text" id="d-desc" placeholder="Ex: 5 caixas de leite, cobertores tamanho G">
          </div>
          <div>
            <label>Categoria</label>
            <select id="d-categoria">
              <option value="ALIMENTO">Alimento</option>
              <option value="ROUPA">Roupa / Agasalho</option>
              <option value="HIGIENE">Higiene Pessoal</option>
              <option value="OUTRO">Outros</option>
            </select>
          </div>
          <div>
            <label>Valor Estimado (R$, opcional)</label>
            <input type="number" id="d-val-estimado" step="0.01" min="0" placeholder="0,00">
          </div>
        </div>
      </div>
    </div>

    <div class="info-box">
      ℹ️ Esta doação gerará automaticamente um <strong>Recibo Digital</strong> e uma
      <strong>Notificação Administrativa</strong>.
    </div>

    <button class="btn-submit" id="btn-doar" onclick="enviarDoacao()">
      Confirmar e Enviar Doação 💛
    </button>
    <a href="home_doador.html" class="link-voltar">Cancelar</a>
  </div>
</div>

<script type="module">
  import { auth, doacaoAPI } from './js/api.js';
  if (!auth.isLogged()) window.location.href = 'index.html';

  const params = new URLSearchParams(window.location.search);
  const campanhaId = params.get('campanhaId');

  if (!campanhaId) {
    alert('Campanha não identificada. Redirecionando...');
    window.location.href = 'home_doador.html';
  }

  window.alternarCampos = function () {
    const tipo = document.getElementById('d-tipo').value;
    const fin = document.getElementById('grupo-financeiro');
    const item = document.getElementById('grupo-item');
    if (tipo === 'financeira') {
      fin.style.display = 'contents';
      item.style.display = 'none';
    } else {
      fin.style.display = 'none';
      item.style.display = 'block';
    }
  };

  window.enviarDoacao = async function () {
    const alertEl = document.getElementById('alert-msg');
    alertEl.className = 'alert erro';
    alertEl.classList.remove('show');

    const tipo = document.getElementById('d-tipo').value;
    const user = auth.getUser();

    const payload = {
      campanhaId,
      doadorId: user ? user.id : null,
      data: new Date().toISOString().split('T')[0]
    };

    if (tipo === 'financeira') {
      const val = parseFloat(document.getElementById('d-valor').value);
      if (!val || val <= 0) {
        alertEl.textContent = 'Informe um valor válido maior que zero.';
        alertEl.classList.add('show');
        return;
      }
      payload.valor = val;
      payload.metodoPagamento = document.getElementById('d-metodo').value;
    } else {
      const desc = document.getElementById('d-desc').value.trim();
      if (!desc) {
        alertEl.textContent = 'Descreva o item que deseja doar.';
        alertEl.classList.add('show');
        return;
      }
      payload.descricao = desc;
      payload.categoria = document.getElementById('d-categoria').value;
      payload.valorEstimado = parseFloat(document.getElementById('d-val-estimado').value) || 0;
    }

    const btn = document.getElementById('btn-doar');
    btn.disabled = true;
    btn.textContent = 'Enviando...';

    try {
      await doacaoAPI.realizar(payload);
      alertEl.className = 'alert sucesso show';
      alertEl.textContent = '✅ Doação registrada com sucesso! Obrigado pela sua contribuição!';
      setTimeout(() => window.location.href = 'home_doador.html', 2000);
    } catch (e) {
      alertEl.className = 'alert erro show';
      alertEl.textContent = e.message || 'Erro ao registrar doação.';
      btn.disabled = false;
      btn.textContent = 'Confirmar e Enviar Doação 💛';
    }
  };
</script>
</body>
</html>
