<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro | Mais Amor Por Favor</title>
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<header>
  <h1>Mais Amor Por Favor</h1>
  <p>Crie sua conta para começar a ajudar</p>
</header>

<div class="container">
  <div class="card" style="max-width:560px; margin:0 auto;">
    <h2 id="titulo-cadastro">Cadastro de Doador</h2>
    <div id="alert-msg" class="alert erro"></div>

    <div class="form-grid">
      <div class="full-width">
        <label>Nome Completo</label>
        <input type="text" id="cad-nome" required placeholder="Digite seu nome completo">
      </div>

      <div>
        <label>E-mail</label>
        <input type="email" id="cad-email" required placeholder="email@exemplo.com">
      </div>

      <div>
        <label>Documento (CPF/CNPJ)</label>
        <input type="text" id="cad-documento" required placeholder="000.000.000-00">
      </div>

      <div>
        <label>Data de Nascimento</label>
        <input type="date" id="cad-nasc" required>
      </div>

      <div>
        <label>Senha</label>
        <input type="password" id="cad-senha" required placeholder="••••••">
      </div>

      <div class="full-width" id="campo-ong" style="display:none;">
        <label>Registro da ONG</label>
        <input type="text" id="cad-registro" placeholder="Número do registro oficial">
      </div>
    </div>

    <button class="btn-submit" id="btn-cadastrar" onclick="fazerCadastro()">Finalizar Cadastro</button>
    <a href="index.html" class="link-voltar" style="margin-top:16px;">← Voltar ao Login</a>
  </div>
</div>

<script type="module">
  import { pessoaAPI } from './js/api.js';

  const params = new URLSearchParams(window.location.search);
  const perfil = (params.get('perfil') || 'doador').toUpperCase();

  document.getElementById('titulo-cadastro').textContent =
    `Cadastro de ${perfil === 'ORGANIZADOR' ? 'Organizador' : 'Doador'}`;

  if (perfil === 'ORGANIZADOR') {
    document.getElementById('campo-ong').style.display = 'block';
  }

  window.fazerCadastro = async function () {
    const alertEl = document.getElementById('alert-msg');
    alertEl.className = 'alert erro';
    alertEl.classList.remove('show');

    const payload = {
      nome: document.getElementById('cad-nome').value.trim(),
      email: document.getElementById('cad-email').value.trim(),
      senha: document.getElementById('cad-senha').value,
      documento: document.getElementById('cad-documento').value.trim(),
      dataNascimento: document.getElementById('cad-nasc').value,
      perfil
    };

    if (!payload.nome || !payload.email || !payload.senha || !payload.documento || !payload.dataNascimento) {
      alertEl.textContent = 'Preencha todos os campos obrigatórios.';
      alertEl.classList.add('show');
      return;
    }

    if (perfil === 'ORGANIZADOR') {
      payload.registroOng = document.getElementById('cad-registro').value.trim();
    }

    const btn = document.getElementById('btn-cadastrar');
    btn.disabled = true;
    btn.textContent = 'Cadastrando...';

    try {
      await pessoaAPI.cadastrar(payload);
      alert('✅ Cadastro realizado com sucesso! Faça o login.');
      window.location.href = 'index.html';
    } catch (e) {
      alertEl.textContent = e.message || 'Erro ao realizar cadastro.';
      alertEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Finalizar Cadastro';
    }
  };
</script>
</body>
</html>
